<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Slider-Interaction</title>
</head>
<body>
    <div class="wrapper">
        <i id="left" class="fa-solid fa-angle-left"></i>
        <ul class="carousel">
            <li class="card">
                <div class="img">
                    <img src="alex-img.jpg" alt="img" draggable="false">  
                </div>
                <h2>Alexandre O Grande</h2>
                <span>Imperador/Conquistador</span>
            </li>
             <li class="card">
                <div class="img">
                    <img src="jc-img.webp" alt="img" draggable="false">  
                </div>
                <h2>Julio Cesar</h2>
                <span>Imperador/Conquistador</span>
            </li>
             <li class="card">
                <div class="img">
                    <img src="napo-img.jpg" alt="img" draggable="false">  
                </div>
                <h2>Napoleão Bonaparte</h2>
                <span>Imperador/Conquistador</span>
            </li>
             <li class="card">
                <div class="img">
                    <img src="gk-img.jpg" alt="img" draggable="false">  
                </div>
                <h2>Genghis Khan</h2>
                <span>Imperador/Conquistador</span>
            </li>
             <li class="card">
                <div class="img">
                    <img src="ma-img.jpg" alt="img" draggable="false">  
                </div>
                <h2>Marco Aurélio</h2>
                <span>Imperador/Conquistador</span>
            </li>
            <li class="card">
                <div class="img">
                    <img src="cg-img.webp" alt="img" draggable="false">  
                </div>
                <h2>Ciro O Grande</h2>
                <span>Imperador/Conquistador</span>
            </li>
        </ul>
        <i id="right" class="fa-solid fa-angle-right"></i>
    </div>
    <script src="script.js"></script>
</body>
</html>
