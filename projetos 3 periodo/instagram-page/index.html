<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instagram</title>
</head>
<body>
    <div id="background">

        <section id="profileInfo">

            <div id="left">
                <img src="perfil-img.png" alt="#">
                <h2 id="username">JLT.ltda</h2>
            </div>

            <div id="right">
                <div id="userTop">
                    <div class="button" id="follow">Seguir</div>
                    <div class="button">Mensagem</div>
                    <div class="button"><img src="follow.png" alt="#"></div>
                    <img id="more" src="more.png" alt="#">
                </div>
                <div id="infoMid">
                    <p><strong>3</strong> posts</p>
                    <p><strong>110</strong> seguidores</p>
                    <p><strong>35</strong> seguindo</p>
                </div>
                <div id="bioBot">
                    <p>     <strong>João Luís de Carvalho </strong> <br>
                        💻 <span style="color:rgb(128, 128, 128)">Programador e Criador de Conteúdo</span> <br>
                        📚 Dicas de Código e Tecnologia <br>
                        🌐 Sites | Aplicativos | Programação <br>
                        🎯 Aprenda tecnologia de forma simples
                    </p>
                </div>
            </div>

        </section> 
        
        <hr>

        <section id="posts">

            <div id="bar">
                <div class="option" id="active">
                    <img src="posts-img.png" alt="#">
                    <p> POSTS</p>
                </div>
                <div class="option">
                    <img src="reels-img.png" alt="#">
                    <p>REELS</p>
                </div>
                <div class="option">
                    <img src="tagged-img.png" alt="#">
                    <p>TAGGED</p>
                </div>
            </div>

            <div id="feed">
                <img class="post" src="post-1.png" alt="#">
                <img class="post" src="post-2.png" alt="#">
                <img class="post" src="post-3.png" alt="#">
            </div>

        </section>

       

    </div>
    
</body>
</html>
