<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>image-accordion</title>
</head>
<body>
    <h2 style="text-align: center; color: white; font-weight: bolder; font-size: 30px;">Fases do Dia</h2>
    <div class="wrapper">

        <div class="container">
            <input type="radio" name="slide" id="c1">
            <label for="c1" class="card" id="one">
                <div class="row">

                    <div class="icon">
                       
                    </div>

                    <div class="description">
                        <h4>Morning</h4>
                        <p>when the sun rises</p>
                    </div>

                </div>
            </label>

            <input type="radio" name="slide" id="c2">
            <label for="c2" class="card" id="two">
                <div class="row">

                    <div class="icon">
                        
                    </div>

                    <div class="description">
                        <h4>Afternoon</h4>
                        <p>when the sun is strongest</p>
                    </div>

                </div>
            </label>

            <input type="radio" name="slide" id="c3">
            <label for="c3" class="card" id="three">
                <div class="row">

                    <div class="icon">
                       
                    </div>

                    <div class="description">
                        <h4>Sunset</h4>
                        <p>when the sun sets on the horizon</p>
                    </div>

                </div>
            </label>

            <input type="radio" name="slide" id="c4">
            <label for="c4" class="card" id="four">
                <div class="row">

                    <div class="icon">
                        
                    </div>

                    <div class="description">
                        <h4>night</h4>
                        <p>when the moon rises</p>
                    </div>

                </div>
            </label>

            
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
